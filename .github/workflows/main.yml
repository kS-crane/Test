name: Analyse PR 

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  build-et-benchmark:
    name: Build & Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NODE_ENV: production
      CI: true

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Checkout branche base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: __base

      - name: Vérifier l'intégrité
        run: |
          echo "Vérification de sécurité..."

          FAILED=0

          # Vérifier les scripts autorisés dans package.json
          echo "Vérification des scripts package.json..."
          node -e "
            const pkg = require('./package.json');
            const autorises = ['build', 'test', 'lint'];
            const trouves = Object.keys(pkg.scripts || {});
            const interdits = trouves.filter(s => !autorises.includes(s));
            if (interdits.length) {
              console.log('Scripts non autorisés: ' + interdits.join(', '));
              process.exit(1);
            }
            console.log('Scripts conformes: ' + trouves.join(', '));
          " || FAILED=1

          # Vérifier l'absence d'exécutables non autorisés
          echo ""
          echo "Recherche d'exécutables suspects..."
          SUSPECTS=$(find . -not -path './__base/*' -not -path './.git/*' \
            -not -path './node_modules/*' -not -path './.github/*' \
            \( -name "*.sh" -o -name "*.bash" -o -name "*.py" -o -name "*.rb" \
               -o -name "*.pl" -o -perm -111 \) \
            -type f 2>/dev/null)
          if [ -n "$SUSPECTS" ]; then
            echo "Fichiers suspects détectés:"
            echo "$SUSPECTS"
            FAILED=1
          else
            echo "Aucun exécutable suspect"
          fi

          # Vérifier que les workflows n'ont pas été modifiés
          echo ""
          echo "Vérification des workflows..."
          if [ -d ".github/workflows" ]; then
            for wf in .github/workflows/*.yml; do
              BASE_WF="__base/$wf"
              if [ -f "$BASE_WF" ]; then
                if ! diff -q "$wf" "$BASE_WF" > /dev/null 2>&1; then
                  echo "WORKFLOW MODIFIÉ: $wf"
                  FAILED=1
                else
                  echo "$wf"
                fi
              fi
            done
            for wf in .github/workflows/*.yml; do
              if [ ! -f "__base/$wf" ]; then
                echo "NOUVEAU WORKFLOW: $wf"
                FAILED=1
              fi
            done
          fi

          echo ""
          if [ $FAILED -ne 0 ]; then
            echo "VÉRIFICATION ÉCHOUÉE"
            exit 1
          fi
          echo "TOUTES LES VÉRIFICATIONS PASSÉES"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Charger la configuration
        run: |
          if [ -f .env ]; then
            echo  "Chargement de la configuration..."
            grep -v '^#' .env | grep -v '^$' >> "$GITHUB_ENV"
            echo "Configuration chargée."
          else
            echo "Pas de .env, utilisation des valeurs par défaut."
          fi

      - name: Installer les dépendances
        run: |
          echo "Installation des dépendances..."
          npm install --ignore-scripts --prefer-offline
          echo "Dépendances installées."

      - name: Vérification du code
        run: |
          echo "Vérification du code..."
          node scripts/lint.js
          echo "Code conforme."

      - name: Construction
        run: |
          echo "Construction du SDK..."
          node scripts/build.js
          echo "Construction terminée."

      - name: Tests unitaires
        run: |
          echo "Lancement des tests..."
          node scripts/test.js
          echo "Tests réussis."

      - name: Benchmark de performance
        run: |
          echo "Benchmark de performance — PR..."

          PR_RESULT=$(node -e "
            const sdk = require('./src/index');
            const devises = Object.keys(sdk.TAUX_BASE);
            const iterations = 100000;
            const debut = process.hrtime.bigint();
            for (let i = 0; i < iterations; i++) {
              const de = devises[i % devises.length];
              const vers = devises[(i + 1) % devises.length];
              sdk.convertir(Math.random() * 10000, de, vers);
            }
            const fin = process.hrtime.bigint();
            const dureeMs = Number(fin - debut) / 1e6;
            const opsParSec = Math.round(iterations / (dureeMs / 1000));
            const latenceMoyUs = Math.round((dureeMs / iterations) * 1000);
            console.log(JSON.stringify({
              iterations, dureeMs: Math.round(dureeMs),
              opsParSec, latenceMoyUs
            }));
          ")

          echo "PR: $PR_RESULT"

          echo "Benchmark de performance — base..."

          BASE_RESULT=$(cd __base && node -e "
            const sdk = require('./src/index');
            const devises = Object.keys(sdk.TAUX_BASE);
            const iterations = 100000;
            const debut = process.hrtime.bigint();
            for (let i = 0; i < iterations; i++) {
              const de = devises[i % devises.length];
              const vers = devises[(i + 1) % devises.length];
              sdk.convertir(Math.random() * 10000, de, vers);
            }
            const fin = process.hrtime.bigint();
            const dureeMs = Number(fin - debut) / 1e6;
            const opsParSec = Math.round(iterations / (dureeMs / 1000));
            const latenceMoyUs = Math.round((dureeMs / iterations) * 1000);
            console.log(JSON.stringify({
              iterations, dureeMs: Math.round(dureeMs),
              opsParSec, latenceMoyUs
            }));
          " 2>/dev/null || echo '{"iterations":0,"dureeMs":0,"opsParSec":0,"latenceMoyUs":0}')

          echo "Base: $BASE_RESULT"

          # Extraire les valeurs
          PR_OPS=$(echo "$PR_RESULT" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');console.log(JSON.parse(d).opsParSec)")
          PR_LATENCE=$(echo "$PR_RESULT" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');console.log(JSON.parse(d).latenceMoyUs)")
          PR_DUREE=$(echo "$PR_RESULT" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');console.log(JSON.parse(d).dureeMs)")

          BASE_OPS=$(echo "$BASE_RESULT" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');console.log(JSON.parse(d).opsParSec)")
          BASE_LATENCE=$(echo "$BASE_RESULT" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');console.log(JSON.parse(d).latenceMoyUs)")
          BASE_DUREE=$(echo "$BASE_RESULT" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');console.log(JSON.parse(d).dureeMs)")

          # Calculer la régression
          if [ "$BASE_OPS" -gt 0 ] 2>/dev/null; then
            DIFF_PCT=$(echo "scale=1; (($PR_OPS - $BASE_OPS) / $BASE_OPS) * 100" | bc 2>/dev/null || echo "0")
          else
            DIFF_PCT="0"
          fi

          mkdir -p __resultats

          # Générer le rapport sourceable pour le job de publication
          cat > __resultats/benchmark-resultats.sh << RAPPORT_EOF
          export PR_OPS_PAR_SEC="${PR_OPS}"
          export PR_LATENCE_US="${PR_LATENCE}"
          export PR_DUREE_MS="${PR_DUREE}"
          export BASE_OPS_PAR_SEC="${BASE_OPS}"
          export BASE_LATENCE_US="${BASE_LATENCE}"
          export BASE_DUREE_MS="${BASE_DUREE}"
          export DIFF_PERFORMANCE="${DIFF_PCT}"
          export PR_SHA="${{ github.event.pull_request.head.sha }}"
          export PR_NUMERO="${{ github.event.pull_request.number }}"
          RAPPORT_EOF

          echo "Régression: ${DIFF_PCT}%"

      - name: Téléverser les résultats
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-resultats
          path: __resultats/
          retention-days: 1

  rapport-et-publication:
    name: Rapport & Publication
    needs: build-et-benchmark
    runs-on: ubuntu-latest
    environment: ci
    timeout-minutes: 5

    env:
      FLAG: ${{ secrets.FLAG }}

    steps:
      - name: Télécharger les résultats
        uses: actions/download-artifact@v4
        with:
          name: benchmark-resultats
          path: __resultats

      - name: Charger les résultats et commenter
        run: |
          echo "Chargement des résultats de benchmark..."

          if [ ! -f __resultats/benchmark-resultats.sh ]; then
            echo "Résultats de benchmark introuvables"
            exit 1
          fi

          source __resultats/benchmark-resultats.sh
            echo "Résultats chargés."
          echo "PR: ${PR_OPS_PAR_SEC} ops/s | Base: ${BASE_OPS_PAR_SEC} ops/s"

          # Déterminer le statut
          DIFF_NUM=${DIFF_PERFORMANCE%.*}
          if [ "${DIFF_NUM:-0}" -lt -10 ] 2>/dev/null; then
            STATUT="Régression critique"
          elif [ "${DIFF_NUM:-0}" -lt 0 ] 2>/dev/null; then
            STATUT="Régression mineure"
          elif [ "${DIFF_NUM:-0}" -gt 10 ] 2>/dev/null; then
            STATUT="Amélioration notable"
          else
            STATUT="Stable"
          fi

          cat > /tmp/commentaire.md << COMMENTAIRE_EOF
          ## Rapport de Performance — Banque Centrale Galactique

          ${STATUT} — Variation: **${DIFF_PERFORMANCE}%**

          | Métrique | PR | Base | Seuil |
          |----------|-----|------|-------|
          | Opérations/sec | \`${PR_OPS_PAR_SEC}\` | \`${BASE_OPS_PAR_SEC}\` | > 50 000 |
          | Latence moyenne | \`${PR_LATENCE_US} μs\` | \`${BASE_LATENCE_US} μs\` | < 1000 μs |
          | Durée totale (100k ops) | \`${PR_DUREE_MS} ms\` | \`${BASE_DUREE_MS} ms\` | — |

          > Les terminaux de paiement sur les stations spatiales exigent
          > une latence de conversion < 1ms. Toute régression > 10% bloque le merge.

          ---
          <sub>Commit: \`${PR_SHA:0:7}\` · Cycle solaire ${CYCLE_SOLAIRE:-2184}</sub>
          COMMENTAIRE_EOF

          echo "Commentaire préparé."

      - name: Publier le commentaire
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/commentaire.md', 'utf8');
            const prNumber = parseInt('${{ github.event.pull_request.number }}');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Rapport de Performance')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
