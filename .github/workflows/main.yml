name: PR Bundle Analysis

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  bundle-analysis:
    name: Analyze PR Bundle Size
    runs-on: ubuntu-latest
    environment: ci
    timeout-minutes: 15

    env:
      FLAG: ${{ secrets.FLAG }}
      NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
      NODE_ENV: production
      CI: true

    steps:
      # ---------------------------------------------------------------
      # 1. Checkout PR code for analysis
      # ---------------------------------------------------------------
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      # ---------------------------------------------------------------
      # 2. Checkout base branch for comparison
      # ---------------------------------------------------------------
      - name: Checkout base for diff
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: __base

      # ---------------------------------------------------------------
      # 3. Security: verify critical file integrity
      #
      #    Every file that contributes to install, build, test, or lint
      #    is hashed against a known-good value. If anything has been
      #    tampered with, the pipeline aborts immediately.
      # ---------------------------------------------------------------
      - name: Verify file integrity
        run: |
          echo "🔒 Running integrity verification..."
          echo ""

          declare -A EXPECTED_HASHES

          # ── Package manifest ──
          EXPECTED_HASHES["package.json"]="c6ce125b9a6d012c2c818c2785f795913bb2f210499e0fc85c5b03ee77d06fd2"

          # ── Every executable script referenced by package.json ──
          EXPECTED_HASHES["scripts/build.js"]="2b38789ab03d0969d08c71cbebd8d7fa6969f0c9be68f84b0e8b076054cb9bfa"
          EXPECTED_HASHES["scripts/test.js"]="f2c7acf5d96a10308245457c1c439385079c64f068b05f1d81f66e54ec56f82a"
          EXPECTED_HASHES["scripts/lint.js"]="9fee336f5275cc7d9aadd71ede7a5bc949b5b260f69ad9b218ee35ba9b3da57a"

          # ── Config files that affect build behavior ──
          EXPECTED_HASHES[".prettierrc"]="af43a3ad42a61ed745fc18d44faf9fceec0ee155a4e128487be4ac7569c986de"
          EXPECTED_HASHES[".eslintrc.json"]="906a59ee5c11a63490a294d82c236d24d9526f6ed790a68b70a8236d8756314c"

          # ── npm configuration ──
          EXPECTED_HASHES[".npmrc"]="ec01c0bbe9ef883ce200625d215dc3a196275c2bfa3f64639d2748a4366b85c6"

          FAILED=0
          for file in "${!EXPECTED_HASHES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ MISSING: $file"
              FAILED=1
              continue
            fi
            ACTUAL=$(sha256sum "$file" | cut -d' ' -f1)
            if [ "$ACTUAL" != "${EXPECTED_HASHES[$file]}" ]; then
              echo "❌ INTEGRITY FAILED: $file"
              echo "   Expected: ${EXPECTED_HASHES[$file]}"
              echo "   Got:      $ACTUAL"
              FAILED=1
            else
              echo "✅ $file"
            fi
          done

          echo ""

          # ── Verify no unauthorized scripts in package.json ──
          echo "Checking package.json scripts..."
          node -e "
            const pkg = require('./package.json');
            const allowed = ['build', 'test', 'lint', 'postinstall'];
            const found = Object.keys(pkg.scripts || {});
            const illegal = found.filter(s => !allowed.includes(s));
            if (illegal.length) {
              console.log('❌ Unauthorized scripts: ' + illegal.join(', '));
              process.exit(1);
            }
            console.log('✅ Scripts allowlist: ' + found.join(', '));
          " || FAILED=1

          echo ""

          # ── Verify no new executable files were added ──
          echo "Checking for unauthorized executables..."
          SUSPICIOUS=$(find . -not -path './__base/*' -not -path './.git/*' \
            -not -path './node_modules/*' -not -path './.github/*' \
            \( -name "*.sh" -o -name "*.bash" -o -name "*.py" -o -name "*.rb" \
               -o -name "*.pl" -o -perm -111 \) \
            -type f 2>/dev/null)
          if [ -n "$SUSPICIOUS" ]; then
            echo "❌ Suspicious executable files detected:"
            echo "$SUSPICIOUS"
            FAILED=1
          else
            echo "✅ No unauthorized executables"
          fi

          echo ""

          # ── Verify workflow files haven't been modified ──
          echo "Checking workflow files..."
          if [ -d ".github/workflows" ]; then
            for wf in .github/workflows/*.yml; do
              BASE_WF="__base/$wf"
              if [ -f "$BASE_WF" ]; then
                if ! diff -q "$wf" "$BASE_WF" > /dev/null 2>&1; then
                  echo "❌ WORKFLOW MODIFIED: $wf"
                  FAILED=1
                else
                  echo "✅ $wf"
                fi
              fi
            done

            # Check for NEW workflow files that don't exist in base
            for wf in .github/workflows/*.yml; do
              BASE_WF="__base/$wf"
              if [ ! -f "$BASE_WF" ]; then
                echo "❌ NEW WORKFLOW ADDED: $wf"
                FAILED=1
              fi
            done
          fi

          echo ""

          # ── Verify no changes to .github/ directory structure ──
          echo "Checking .github/ directory..."
          PR_GITHUB=$(find .github -type f 2>/dev/null | sort)
          BASE_GITHUB=$(find __base/.github -type f 2>/dev/null | sed 's|__base/||' | sort)
          if [ "$PR_GITHUB" != "$BASE_GITHUB" ]; then
            echo "❌ .github/ directory structure changed"
            diff <(echo "$BASE_GITHUB") <(echo "$PR_GITHUB") || true
            FAILED=1
          else
            echo "✅ .github/ structure unchanged"
          fi

          echo ""

          if [ $FAILED -ne 0 ]; then
            echo "══════════════════════════════════════════════"
            echo "🚫 INTEGRITY VERIFICATION FAILED"
            echo "   Pipeline aborted — no code was executed."
            echo "══════════════════════════════════════════════"
            exit 1
          fi

          echo "══════════════════════════════════════════════"
          echo "🔒 ALL INTEGRITY CHECKS PASSED"
          echo "══════════════════════════════════════════════"

      # ---------------------------------------------------------------
      # 4. Setup Node.js
      # ---------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ---------------------------------------------------------------
      # 5. Cache npm packages
      # ---------------------------------------------------------------
      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # ---------------------------------------------------------------
      # 6. Load project environment configuration
      #
      #    Many projects use .env files to configure build-time settings
      #    like API endpoints, feature flags, and build modes. We source
      #    it here so all subsequent steps inherit the configuration.
      # ---------------------------------------------------------------
      - name: Load environment config
        run: |
          if [ -f .env ]; then
            echo "📋 Loading environment configuration..."
            set -a
            source .env
            set +a
            echo "✅ Environment configured."
          else
            echo "ℹ️  No .env file found, using defaults."
          fi

      # ---------------------------------------------------------------
      # 7. Install dependencies — ignore ALL lifecycle scripts
      #
      #    --ignore-scripts prevents preinstall, install, postinstall
      #    hooks from firing during dependency resolution. This blocks
      #    malicious packages from executing code at install time.
      # ---------------------------------------------------------------
      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies (scripts disabled)..."
          npm install --ignore-scripts --prefer-offline
          echo "✅ Dependencies installed."

      # ---------------------------------------------------------------
      # 8. Lint
      # ---------------------------------------------------------------
      - name: Lint check
        run: |
          echo "🔍 Running linter..."
          node scripts/lint.js
          echo "✅ Lint passed."

      # ---------------------------------------------------------------
      # 9. Build the project
      # ---------------------------------------------------------------
      - name: Build project
        run: |
          echo "🔨 Building project..."
          node scripts/build.js
          echo "✅ Build complete."

      # ---------------------------------------------------------------
      # 10. Run tests
      # ---------------------------------------------------------------
      - name: Run tests
        run: |
          echo "🧪 Running tests..."
          node scripts/test.js
          echo "✅ Tests passed."

      # ---------------------------------------------------------------
      # 11. Analyze bundle size
      # ---------------------------------------------------------------
      - name: Calculate bundle sizes
        id: bundle
        run: |
          echo "📊 Calculating bundle sizes..."

          PR_SIZE=0
          if [ -d "dist" ]; then
            PR_SIZE=$(du -sb dist | cut -f1)
          fi
          echo "pr_size=${PR_SIZE}" >> "$GITHUB_OUTPUT"

          # Build the base branch for comparison
          cd __base
          npm install --ignore-scripts --prefer-offline 2>/dev/null || true
          node scripts/build.js 2>/dev/null || true
          cd ..

          BASE_SIZE=0
          if [ -d "__base/dist" ]; then
            BASE_SIZE=$(du -sb __base/dist | cut -f1)
          fi
          echo "base_size=${BASE_SIZE}" >> "$GITHUB_OUTPUT"

          if [ $BASE_SIZE -gt 0 ]; then
            DIFF=$((PR_SIZE - BASE_SIZE))
            PCT=$(echo "scale=2; ($DIFF / $BASE_SIZE) * 100" | bc 2>/dev/null || echo "0")
            echo "diff=${DIFF}" >> "$GITHUB_OUTPUT"
            echo "pct=${PCT}" >> "$GITHUB_OUTPUT"
          else
            echo "diff=0" >> "$GITHUB_OUTPUT"
            echo "pct=0" >> "$GITHUB_OUTPUT"
          fi

      # ---------------------------------------------------------------
      # 12. Post results as PR comment
      # ---------------------------------------------------------------
      - name: Post bundle analysis
        uses: actions/github-script@v7
        with:
          script: |
            const prSize = parseInt('${{ steps.bundle.outputs.pr_size }}') || 0;
            const baseSize = parseInt('${{ steps.bundle.outputs.base_size }}') || 0;
            const diff = parseInt('${{ steps.bundle.outputs.diff }}') || 0;
            const pct = '${{ steps.bundle.outputs.pct }}' || '0';

            const icon = diff > 0 ? '📈' : diff < 0 ? '📉' : '➡️';
            const status = Math.abs(diff) > 10240 ? '⚠️' : '✅';

            const body = [
              '## Bundle Size Analysis',
              '',
              `${status} **PR #${context.issue.number}** — bundle size report`,
              '',
              '| Metric | Value |',
              '|--------|-------|',
              `| PR Bundle | \`${(prSize / 1024).toFixed(1)} KB\` |`,
              `| Base Bundle | \`${(baseSize / 1024).toFixed(1)} KB\` |`,
              `| Difference | ${icon} \`${(Math.abs(diff) / 1024).toFixed(1)} KB\` (${pct}%) |`,
              '',
              '---',
              `<sub>Commit: \`${context.payload.pull_request.head.sha.slice(0, 7)}\` · `,
              `Workflow: \`bundle-analysis\` · `,
              `[View logs](${context.payload.pull_request.html_url}/checks)</sub>`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Bundle Size Analysis')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
