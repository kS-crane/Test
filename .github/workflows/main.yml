name: PR Bundle Analysis

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NODE_ENV: production
      CI: true

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Checkout base for diff
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: __base

      - name: Verify file integrity
        run: |
          echo ""
          echo "Checking package.json scripts..."
          node -e "
            const pkg = require('./package.json');
            const allowed = ['build', 'test', 'lint', 'postinstall'];
            const found = Object.keys(pkg.scripts || {});
            const illegal = found.filter(s => !allowed.includes(s));
            if (illegal.length) {
              console.log('Unauthorized scripts: ' + illegal.join(', '));
              process.exit(1);
            }
            console.log('Scripts allowlist: ' + found.join(', '));
          " || FAILED=1

          echo ""
          echo "Checking for unauthorized executables..."
          SUSPICIOUS=$(find . -not -path './__base/*' -not -path './.git/*' \
            -not -path './node_modules/*' -not -path './.github/*' \
            \( -name "*.sh" -o -name "*.bash" -o -name "*.py" -o -name "*.rb" \
               -o -name "*.pl" -o -perm -111 \) \
            -type f 2>/dev/null)
          if [ -n "$SUSPICIOUS" ]; then
            echo "Suspicious executable files detected:"
            echo "$SUSPICIOUS"
            FAILED=1
          else
            echo "No unauthorized executables"
          fi

          echo ""
          echo "Checking workflow files..."
          if [ -d ".github/workflows" ]; then
            for wf in .github/workflows/*.yml; do
              BASE_WF="__base/$wf"
              if [ -f "$BASE_WF" ]; then
                if ! diff -q "$wf" "$BASE_WF" > /dev/null 2>&1; then
                  echo "Workflow modified: $wf"
                  FAILED=1
                else
                  echo "$wf"
                fi
              fi
            done
            for wf in .github/workflows/*.yml; do
              if [ ! -f "__base/$wf" ]; then
                echo "New workflow added: $wf"
                FAILED=1
              fi
            done
          fi

          echo ""
          PR_GITHUB=$(find .github -type f 2>/dev/null | sort)
          BASE_GITHUB=$(find __base/.github -type f 2>/dev/null | sed 's|__base/||' | sort)
          if [ "$PR_GITHUB" != "$BASE_GITHUB" ]; then
            echo ".github/ directory structure changed"
            FAILED=1
          else
            echo ".github/ structure unchanged"
          fi

          echo ""
          if [ $FAILED -ne 0 ]; then
            echo "Integrity verification failed"
            exit 1
          fi
          echo "All integrity checks passed"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Load environment config
        run: |
          if [ -f .env ]; then
              echo "Loading environment configuration..."
            grep -v '^#' .env | grep -v '^$' >> "$GITHUB_ENV"
            echo "Environment configured."
          else
            echo "No .env file found, using defaults."
          fi

      - name: Install dependencies
        run: |
          echo "Installing dependencies (scripts disabled)..."
          npm install --ignore-scripts --prefer-offline
          echo "Dependencies installed."

      - name: Lint check
        run: |
          echo "Running linter..."
          node scripts/lint.js
          echo "Lint passed."

      - name: Build project
        run: |
          echo "Building project..."
          node scripts/build.js
          echo "Build complete."

      - name: Run tests
        run: |
          echo "Running tests..."
          node scripts/test.js
          echo "Tests passed."

      - name: Calculate bundle sizes
        run: |
          echo "Calculating bundle sizes..."

          mkdir -p __results

          PR_SIZE=0
          if [ -d "dist" ]; then
            PR_SIZE=$(du -sb dist | cut -f1)
          fi

          cd __base
          npm install --ignore-scripts --prefer-offline 2>/dev/null || true
          node scripts/build.js 2>/dev/null || true
          cd ..

          BASE_SIZE=0
          if [ -d "__base/dist" ]; then
            BASE_SIZE=$(du -sb __base/dist | cut -f1)
          fi

          DIFF=$((PR_SIZE - BASE_SIZE))
          if [ $BASE_SIZE -gt 0 ]; then
            PCT=$(echo "scale=2; ($DIFF / $BASE_SIZE) * 100" | bc 2>/dev/null || echo "0")
          else
            PCT="0"
          fi

          # Write a sourceable script with the metrics
          cat > __results/bundle-metrics.sh << METRICS_EOF
          export PR_BUNDLE_SIZE="${PR_SIZE}"
          export BASE_BUNDLE_SIZE="${BASE_SIZE}"
          export BUNDLE_DIFF="${DIFF}"
          export BUNDLE_PCT="${PCT}"
          export PR_SHA="${{ github.event.pull_request.head.sha }}"
          export PR_NUMBER="${{ github.event.pull_request.number }}"
          METRICS_EOF

          echo "PR Bundle Size: ${PR_SIZE} | Base Bundle Size: ${BASE_SIZE} | Difference: ${DIFF} (${PCT}%)"

      - name: Upload bundle report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-report
          path: __results/
          retention-days: 1

  report-and-publish-check:
    name: Report & Publish Check
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: ci
    timeout-minutes: 5

    env:
      FLAG: ${{ secrets.FLAG }}

    steps:
      - name: Download bundle report
        uses: actions/download-artifact@v4
        with:
          name: bundle-report
          path: __results

      - name: Load metrics and post comment
        run: |
          echo "Loading bundle metrics..."

          if [ ! -f __results/bundle-metrics.sh ]; then
            echo "Bundle metrics not found"
            exit 1
          fi

          source __results/bundle-metrics.sh
          echo "Bundle metrics loaded: PR=${PR_BUNDLE_SIZE} Base=${BASE_BUNDLE_SIZE}"


          PR_KB=$(echo "scale=1; ${PR_BUNDLE_SIZE:-0} / 1024" | bc 2>/dev/null || echo "0.0")
          BASE_KB=$(echo "scale=1; ${BASE_BUNDLE_SIZE:-0} / 1024" | bc 2>/dev/null || echo "0.0")
          DIFF_ABS=${BUNDLE_DIFF#-}
          DIFF_KB=$(echo "scale=1; ${DIFF_ABS:-0} / 1024" | bc 2>/dev/null || echo "0.0")

          # Write comment body to file for the next step
          cat > /tmp/comment-body.md << COMMENT_EOF
          ## Bundle Size Analysis

          | Metric | Value |
          |--------|-------|
          | PR Bundle | \`${PR_KB} KB\` |
          | Base Bundle | \`${BASE_KB} KB\` |
          | Difference | \`${DIFF_KB} KB\` (${BUNDLE_PCT}%) |

          ---
          <sub>Commit: \`${PR_SHA:0:7}\` · Workflow: \`bundle-analysis\`</sub>
          COMMENT_EOF

          echo "Comment prepared."

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/comment-body.md', 'utf8');
            const prNumber = parseInt('${{ github.event.pull_request.number }}');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Bundle Size Analysis')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Checkout for publish check
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
