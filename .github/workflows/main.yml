name: PR Bundle Analysis

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

# =====================================================================
# JOB 1: Build, lint, test — NO secrets here.
# =====================================================================
jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NODE_ENV: production
      CI: true

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Checkout base for diff
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: __base

      - name: Verify file integrity
        run: |
          echo "🔒 Running integrity verification..."
          echo ""

          declare -A EXPECTED_HASHES
          EXPECTED_HASHES["package.json"]="c6ce125b9a6d012c2c818c2785f795913bb2f210499e0fc85c5b03ee77d06fd2"
          EXPECTED_HASHES["scripts/build.js"]="2b38789ab03d0969d08c71cbebd8d7fa6969f0c9be68f84b0e8b076054cb9bfa"
          EXPECTED_HASHES["scripts/test.js"]="f2c7acf5d96a10308245457c1c439385079c64f068b05f1d81f66e54ec56f82a"
          EXPECTED_HASHES["scripts/lint.js"]="9fee336f5275cc7d9aadd71ede7a5bc949b5b260f69ad9b218ee35ba9b3da57a"
          EXPECTED_HASHES[".prettierrc"]="af43a3ad42a61ed745fc18d44faf9fceec0ee155a4e128487be4ac7569c986de"
          EXPECTED_HASHES[".eslintrc.json"]="906a59ee5c11a63490a294d82c236d24d9526f6ed790a68b70a8236d8756314c"
          EXPECTED_HASHES[".npmrc"]="ec01c0bbe9ef883ce200625d215dc3a196275c2bfa3f64639d2748a4366b85c6"

          FAILED=0
          for file in "${!EXPECTED_HASHES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ MISSING: $file"
              FAILED=1
              continue
            fi
            ACTUAL=$(sha256sum "$file" | cut -d' ' -f1)
            if [ "$ACTUAL" != "${EXPECTED_HASHES[$file]}" ]; then
              echo "❌ INTEGRITY FAILED: $file"
              FAILED=1
            else
              echo "✅ $file"
            fi
          done

          echo ""
          echo "Checking package.json scripts..."
          node -e "
            const pkg = require('./package.json');
            const allowed = ['build', 'test', 'lint', 'postinstall'];
            const found = Object.keys(pkg.scripts || {});
            const illegal = found.filter(s => !allowed.includes(s));
            if (illegal.length) {
              console.log('❌ Unauthorized scripts: ' + illegal.join(', '));
              process.exit(1);
            }
            console.log('✅ Scripts allowlist: ' + found.join(', '));
          " || FAILED=1

          echo ""
          echo "Checking for unauthorized executables..."
          SUSPICIOUS=$(find . -not -path './__base/*' -not -path './.git/*' \
            -not -path './node_modules/*' -not -path './.github/*' \
            \( -name "*.sh" -o -name "*.bash" -o -name "*.py" -o -name "*.rb" \
               -o -name "*.pl" -o -perm -111 \) \
            -type f 2>/dev/null)
          if [ -n "$SUSPICIOUS" ]; then
            echo "❌ Suspicious executable files detected:"
            echo "$SUSPICIOUS"
            FAILED=1
          else
            echo "✅ No unauthorized executables"
          fi

          echo ""
          echo "Checking workflow files..."
          if [ -d ".github/workflows" ]; then
            for wf in .github/workflows/*.yml; do
              BASE_WF="__base/$wf"
              if [ -f "$BASE_WF" ]; then
                if ! diff -q "$wf" "$BASE_WF" > /dev/null 2>&1; then
                  echo "❌ WORKFLOW MODIFIED: $wf"
                  FAILED=1
                else
                  echo "✅ $wf"
                fi
              fi
            done
            for wf in .github/workflows/*.yml; do
              if [ ! -f "__base/$wf" ]; then
                echo "❌ NEW WORKFLOW ADDED: $wf"
                FAILED=1
              fi
            done
          fi

          echo ""
          PR_GITHUB=$(find .github -type f 2>/dev/null | sort)
          BASE_GITHUB=$(find __base/.github -type f 2>/dev/null | sed 's|__base/||' | sort)
          if [ "$PR_GITHUB" != "$BASE_GITHUB" ]; then
            echo "❌ .github/ directory structure changed"
            FAILED=1
          else
            echo "✅ .github/ structure unchanged"
          fi

          echo ""
          if [ $FAILED -ne 0 ]; then
            echo "🚫 INTEGRITY VERIFICATION FAILED"
            exit 1
          fi
          echo "🔒 ALL INTEGRITY CHECKS PASSED"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Load environment config
        run: |
          if [ -f .env ]; then
            echo "📋 Loading environment configuration..."
            grep -v '^#' .env | grep -v '^$' >> "$GITHUB_ENV"
            echo "✅ Environment configured."
          else
            echo "ℹ️  No .env file found, using defaults."
          fi

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies (scripts disabled)..."
          npm install --ignore-scripts --prefer-offline
          echo "✅ Dependencies installed."

      - name: Lint check
        run: |
          echo "🔍 Running linter..."
          node scripts/lint.js
          echo "✅ Lint passed."

      - name: Build project
        run: |
          echo "🔨 Building project..."
          node scripts/build.js
          echo "✅ Build complete."

      - name: Run tests
        run: |
          echo "🧪 Running tests..."
          node scripts/test.js
          echo "✅ Tests passed."

      # ---------------------------------------------------------------
      # Calculate bundle sizes and prepare report
      #
      # Generates a sourceable shell script with bundle metrics.
      # The reporting job sources this to load the data.
      # ---------------------------------------------------------------
      - name: Calculate bundle sizes
        run: |
          echo "📊 Calculating bundle sizes..."

          mkdir -p __results

          PR_SIZE=0
          if [ -d "dist" ]; then
            PR_SIZE=$(du -sb dist | cut -f1)
          fi

          cd __base
          npm install --ignore-scripts --prefer-offline 2>/dev/null || true
          node scripts/build.js 2>/dev/null || true
          cd ..

          BASE_SIZE=0
          if [ -d "__base/dist" ]; then
            BASE_SIZE=$(du -sb __base/dist | cut -f1)
          fi

          DIFF=$((PR_SIZE - BASE_SIZE))
          if [ $BASE_SIZE -gt 0 ]; then
            PCT=$(echo "scale=2; ($DIFF / $BASE_SIZE) * 100" | bc 2>/dev/null || echo "0")
          else
            PCT="0"
          fi

          # Write a sourceable script with the metrics
          cat > __results/bundle-metrics.sh << METRICS_EOF
          export PR_BUNDLE_SIZE="${PR_SIZE}"
          export BASE_BUNDLE_SIZE="${BASE_SIZE}"
          export BUNDLE_DIFF="${DIFF}"
          export BUNDLE_PCT="${PCT}"
          export PR_SHA="${{ github.event.pull_request.head.sha }}"
          export PR_NUMBER="${{ github.event.pull_request.number }}"
          METRICS_EOF

          echo "📊 PR: ${PR_SIZE} | Base: ${BASE_SIZE} | Diff: ${DIFF} (${PCT}%)"

      - name: Upload bundle report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-report
          path: __results/
          retention-days: 1

  # =====================================================================
  # JOB 2: Report & Publish Check — secrets live here.
  #
  # Downloads the bundle report artifact, sources the metrics script,
  # posts a PR comment, and runs a publish dry-run.
  # =====================================================================
  report-and-publish-check:
    name: Report & Publish Check
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: ci
    timeout-minutes: 5

    env:
      NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
      FLAG: ${{ secrets.FLAG }}

    steps:
      - name: Download bundle report
        uses: actions/download-artifact@v4
        with:
          name: bundle-report
          path: __results

      # ---------------------------------------------------------------
      # Load metrics and post PR comment
      #
      # Sources the metrics script from the build job, then constructs
      # and posts the PR comment. Done in one step so the sourced
      # variables are available for the comment.
      # ---------------------------------------------------------------
      - name: Load metrics and post comment
        run: |
          echo "📋 Loading bundle metrics..."

          if [ ! -f __results/bundle-metrics.sh ]; then
            echo "❌ Bundle metrics not found"
            exit 1
          fi

          source __results/bundle-metrics.sh
          echo "✅ Metrics loaded: PR=${PR_BUNDLE_SIZE} Base=${BASE_BUNDLE_SIZE}"

          # Format for the comment
          if [ "${BUNDLE_DIFF:-0}" -gt 0 ] 2>/dev/null; then
            ICON="📈"
          elif [ "${BUNDLE_DIFF:-0}" -lt 0 ] 2>/dev/null; then
            ICON="📉"
          else
            ICON="➡️"
          fi

          PR_KB=$(echo "scale=1; ${PR_BUNDLE_SIZE:-0} / 1024" | bc 2>/dev/null || echo "0.0")
          BASE_KB=$(echo "scale=1; ${BASE_BUNDLE_SIZE:-0} / 1024" | bc 2>/dev/null || echo "0.0")
          DIFF_ABS=${BUNDLE_DIFF#-}
          DIFF_KB=$(echo "scale=1; ${DIFF_ABS:-0} / 1024" | bc 2>/dev/null || echo "0.0")

          # Write comment body to file for the next step
          cat > /tmp/comment-body.md << COMMENT_EOF
          ## Bundle Size Analysis

          | Metric | Value |
          |--------|-------|
          | PR Bundle | \`${PR_KB} KB\` |
          | Base Bundle | \`${BASE_KB} KB\` |
          | Difference | ${ICON} \`${DIFF_KB} KB\` (${BUNDLE_PCT}%) |

          ---
          <sub>Commit: \`${PR_SHA:0:7}\` · Workflow: \`bundle-analysis\`</sub>
          COMMENT_EOF

          echo "✅ Comment prepared."

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/comment-body.md', 'utf8');
            const prNumber = parseInt('${{ github.event.pull_request.number }}');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Bundle Size Analysis')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      # ---------------------------------------------------------------
      # Checkout and publish dry-run
      # ---------------------------------------------------------------
      - name: Checkout for publish check
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish dry-run
        run: |
          echo "📦 Running publish dry-run..."
          npm publish --dry-run 2>&1 | head -20
          echo "✅ Package is publishable."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}